<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAE Salud Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --border:#e5e7eb;

  --green:#16a34a;
  --blue:#2563eb;
  --red:#dc2626;
  --orange:#f59e0b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:16px;
}

.container{
  max-width:1200px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:18px;
  border:1px solid var(--border);
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.header{
  display:flex;
  align-items:center;
  gap:12px;
}

.header h1{
  font-size:1.5rem;
}

.subtitle{
  color:var(--muted);
  font-size:.9rem;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.form-group.full{
  grid-column:1/-1;
}

label{
  font-size:.88rem;
  color:var(--muted);
  font-weight:600;
}

input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border);
  outline:none;
}

.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:16px;
}

button,
.btn-import{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
}

.btn-primary{
  background:#111827;
  color:#fff;
}

.btn-secondary{
  background:#fff;
  border:1px solid var(--border);
}

.btn-export,
.btn-import{
  background:#eef2ff;
  color:#3730a3;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.stat-card{
  background:#f8fafc;
  padding:14px;
  border-radius:16px;
}

.stat-label{
  font-size:.8rem;
  color:var(--muted);
}

.stat-value{
  font-size:1.4rem;
  font-weight:700;
  margin-top:4px;
}

.reference-table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

.reference-table th,
.reference-table td{
  padding:12px 14px;
  border:1px solid var(--border);
  text-align:left;
}

.reference-table th{
  background:#f8fafc;
  color:var(--text);
  font-weight:700;
}

.reference-table td{
  color:var(--muted);
}

.records{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.record-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  position:relative;
}

.record-date{
  color:var(--muted);
  font-size:.85rem;
}

.pressure{
  font-size:1.7rem;
  font-weight:700;
  margin-top:12px;
}

.pulse{
  margin-top:10px;
  color:var(--muted);
}

.tag{
  margin-top:12px;
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  font-size:.78rem;
  font-weight:700;
}

.tag-normal{
  background:#dcfce7;
  color:#166534;
}

.tag-low{
  background:#dbeafe;
  color:#1d4ed8;
}

.tag-warning{
  background:#fef3c7;
  color:#92400e;
}

.tag-high{
  background:#fee2e2;
  color:#991b1b;
}

.tag-critical{
  background:#fee2e2;
  color:#991b1b;
}

.critical{
  border:2px solid rgba(220,38,38,.5);
}

.delete-btn{
  position:absolute;
  top:12px;
  right:12px;
  width:36px;
  height:36px;
  border-radius:12px;
  background:#fef2f2;
  color:#dc2626;
}

.empty{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

canvas{
  margin-top:20px;
  max-height:320px;
}

@media(max-width:768px){

  .form-grid{
    grid-template-columns:1fr;
  }

  .group{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="header">
      <i class="fa-solid fa-heart-pulse fa-2x" style="color:#dc2626;"></i>

      <div>
        <h1>JAE Salud Dashboard</h1>

        <div class="subtitle">
          Seguimiento de presión arterial
        </div>
      </div>
    </div>

  </div>

  <div class="dashboard-grid">

    <div class="card">

      <h2>Nueva Toma</h2>

      <form id="healthForm">

        <div class="form-grid">

          <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="date" required>
          </div>

          <div class="form-group">
            <label>Hora</label>
            <input type="time" id="time" required>
          </div>

          <div class="form-group">
            <label>Sistólica</label>
            <input type="number" id="systolic" required>
          </div>

          <div class="form-group">
            <label>Diastólica</label>
            <input type="number" id="diastolic" required>
          </div>

          <div class="form-group full">
            <label>Pulso BPM</label>
            <input type="number" id="pulse" required>
          </div>

        </div>

        <div class="btn-row">

          <button type="submit" class="btn-primary">
            <i class="fa-solid fa-plus"></i>
            Guardar
          </button>

          <button type="button" class="btn-secondary" id="clearAllBtn">
            <i class="fa-solid fa-trash"></i>
            Borrar Todo
          </button>

        </div>

      </form>

      <div class="btn-row">

        <button type="button" class="btn-export" id="exportPDF">
          PDF
        </button>

        <button type="button" class="btn-export" id="exportCSV">
          CSV
        </button>

        <button type="button" class="btn-export" id="exportJSON">
          JSON
        </button>

        <label for="importFile" class="btn-import">
          <i class="fa-solid fa-upload"></i>
          Importar
        </label>

        <input
          type="file"
          id="importFile"
          accept=".json"
          style="display:none;"
        >

      </div>

    </div>

    <div class="card">

      <div class="stats-grid">

        <div class="stat-card">
          <div class="stat-label">Promedio SIST</div>
          <div class="stat-value" id="avgSys">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Promedio DIAS</div>
          <div class="stat-value" id="avgDia">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Promedio BPM</div>
          <div class="stat-value" id="avgPulse">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Registros</div>
          <div class="stat-value" id="totalRecords">0</div>
        </div>

      </div>

      <canvas id="healthChart"></canvas>

      <div style="margin-top:22px;">
        <h2>Referencia de valores</h2>
        <table class="reference-table">
          <thead>
            <tr>
              <th>Valor</th>
              <th>Resultado</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>118/78</td><td>NORMAL</td></tr>
            <tr><td>125/76</td><td>ELEVADA</td></tr>
            <tr><td>132/82</td><td>HIPERTENSIÓN G1</td></tr>
            <tr><td>145/92</td><td>HIPERTENSIÓN G2</td></tr>
            <tr><td>182/121</td><td>CRÍTICA</td></tr>
            <tr><td>85/55</td><td>BAJA</td></tr>
          </tbody>
        </table>
      </div>

    </div>

    <div class="card">

      <h2>Últimas Tomas</h2>

      <div class="records" id="recordsContainer"></div>

    </div>

  </div>

</div>

<script>

const STORAGE_KEY = "health_dashboard_records";

const form = document.getElementById("healthForm");

const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");

const avgSys = document.getElementById("avgSys");
const avgDia = document.getElementById("avgDia");
const avgPulse = document.getElementById("avgPulse");
const totalRecords = document.getElementById("totalRecords");

const recordsContainer = document.getElementById("recordsContainer");

let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function setCurrentDateTime(){

  const now = new Date();

  dateInput.value = now.toISOString().split("T")[0];

  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");

  timeInput.value = `${h}:${m}`;
}

setCurrentDateTime();

function getStatus(sys, dia) {

  // VALIDACIONES
  if (
    isNaN(sys) ||
    isNaN(dia) ||
    sys <= 0 ||
    dia <= 0
  ) {
    return {
      label: "Inválida",
      class: "warning",
      indicator: "?"
    };
  }

  // VALORES FISIOLÓGICAMENTE IMPOSIBLES
  if (
    sys < 50 ||
    sys > 260 ||
    dia < 30 ||
    dia > 160
  ) {
    return {
      label: "⚠ ERROR",
      class: "critical",
      indicator: "⚠",
      critical: true
    };
  }

  // CRISIS HIPERTENSIVA
  if (sys >= 180 || dia >= 120) {
    return {
      label: "CRÍTICA",
      class: "critical",
      indicator: "↑↑",
      critical: true
    };
  }

  // HIPERTENSIÓN GRADO 2
  if (sys >= 140 || dia >= 90) {
    return {
      label: "HIPERTENSIÓN G2",
      class: "high",
      indicator: "↑",
      critical: false
    };
  }

  // HIPERTENSIÓN GRADO 1
  if (
    (sys >= 130 && sys <= 139) ||
    (dia >= 80 && dia <= 89)
  ) {
    return {
      label: "HIPERTENSIÓN G1",
      class: "warning",
      indicator: "↑",
      critical: false
    };
  }

  // PRESIÓN ELEVADA
  if (
    (sys >= 120 && sys <= 129) &&
    dia < 80
  ) {
    return {
      label: "ELEVADA",
      class: "warning",
      indicator: "•",
      critical: false
    };
  }

  // HIPOTENSIÓN
  if (sys < 90 || dia < 60) {
    return {
      label: "BAJA",
      class: "low",
      indicator: "↓",
      critical: false
    };
  }

  // NORMAL
  return {
    label: "NORMAL",
    class: "normal",
    indicator: "✓",
    critical: false
  };
}

function saveRecords(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function renderRecords(){

  recordsContainer.innerHTML = "";

  if(records.length === 0){

    recordsContainer.innerHTML = `
      <div class="empty">
        No hay registros todavía
      </div>
    `;

    updateStats();
    updateChart();

    return;
  }

  // AGRUPAR POR FECHA
  const groupedByDate = {};

  records.forEach(record => {

    if(!groupedByDate[record.date]){
      groupedByDate[record.date] = [];
    }

    groupedByDate[record.date].push(record);

  });

  // ORDENAR FECHAS
  const sortedDates = Object.keys(groupedByDate)
  .sort((a,b)=> new Date(b) - new Date(a));

  sortedDates.forEach(date => {

    const dailyRecords = groupedByDate[date]

    .sort((a,b)=>{
      return a.time.localeCompare(b.time);
    });

    const group = document.createElement("div");

    group.className = "group";

    // PRIMERA TOMA
    const first = dailyRecords[0];

    const firstStatus = getStatus(
      first.sys,
      first.dia
    );

    const firstCard = document.createElement("div");

    firstCard.className = `
      record-card
      ${firstStatus.class === "critical" ? "critical" : ""}
    `;

    firstCard.innerHTML = `
      <button
        class="delete-btn"
        onclick="deleteRecord('${first.id}')"
      >
        <i class="fa-solid fa-trash"></i>
      </button>

      <div class="record-date">
        <strong>${date}</strong>
      </div>

      <div class="record-date" style="margin-top:4px;">
        🌅 ${first.time}
      </div>

      <div class="pressure">
        ${first.sys}/${first.dia}
      </div>

      <div class="pulse">
        ${first.pulse} BPM
      </div>

      <div class="tag tag-${firstStatus.class}">
        ${firstStatus.label}
      </div>
    `;

    group.appendChild(firstCard);

    // SEGUNDA TOMA
    if(dailyRecords.length > 1){

      const second = dailyRecords[1];

      const secondStatus = getStatus(
        second.sys,
        second.dia
      );

      const secondCard = document.createElement("div");

      secondCard.className = `
        record-card
        ${secondStatus.class === "critical" ? "critical" : ""}
      `;

      secondCard.innerHTML = `
        <button
          class="delete-btn"
          onclick="deleteRecord('${second.id}')"
        >
          <i class="fa-solid fa-trash"></i>
        </button>

        <div class="record-date">
          <strong>${date}</strong>
        </div>

        <div class="record-date" style="margin-top:4px;">
          🌙 ${second.time}
        </div>

        <div class="pressure">
          ${second.sys}/${second.dia}
        </div>

        <div class="pulse">
          ${second.pulse} BPM
        </div>

        <div class="tag tag-${secondStatus.class}">
          ${secondStatus.label}
        </div>
      `;

      group.appendChild(secondCard);
    }

    recordsContainer.appendChild(group);

  });

  updateStats();
  updateChart();
}

function updateStats(){

  totalRecords.textContent = records.length;

  if(records.length === 0){

    avgSys.textContent = 0;
    avgDia.textContent = 0;
    avgPulse.textContent = 0;

    return;
  }

  avgSys.textContent = Math.round(
    records.reduce((a,b)=>a+b.sys,0) / records.length
  );

  avgDia.textContent = Math.round(
    records.reduce((a,b)=>a+b.dia,0) / records.length
  );

  avgPulse.textContent = Math.round(
    records.reduce((a,b)=>a+b.pulse,0) / records.length
  );
}

const chart = new Chart(
  document.getElementById("healthChart"),
  {
    type:"line",
    data:{
      labels:[],
      datasets:[
        {
          label:"Sistólica",
          data:[],
          borderColor:"#dc2626",
          tension:.35
        },
        {
          label:"Diastólica",
          data:[],
          borderColor:"#2563eb",
          tension:.35
        }
      ]
    },
    options:{
      responsive:true
    }
  }
);

function updateChart(){

  const latest = [...records]
  .sort((a,b)=>{
    return new Date(`${a.date}T${a.time}`) -
           new Date(`${b.date}T${b.time}`);
  })
  .slice(-10);

  chart.data.labels = latest.map(
    r => `${r.date} ${r.time}`
  );

  chart.data.datasets[0].data = latest.map(r=>r.sys);
  chart.data.datasets[1].data = latest.map(r=>r.dia);

  chart.update();
}

form.addEventListener("submit",(e)=>{

  e.preventDefault();

  const sys = Number(
    document.getElementById("systolic").value
  );

  const dia = Number(
    document.getElementById("diastolic").value
  );

  const pulse = Number(
    document.getElementById("pulse").value
  );

  records.push({
    id:crypto.randomUUID(),
    date:dateInput.value,
    time:timeInput.value,
    sys,
    dia,
    pulse
  });

  saveRecords();

  renderRecords();

  form.reset();

  setCurrentDateTime();

});

function deleteRecord(id){

  records = records.filter(r=>r.id !== id);

  saveRecords();

  renderRecords();
}

window.deleteRecord = deleteRecord;

document.getElementById("clearAllBtn")
.addEventListener("click",()=>{

  if(!confirm("¿Eliminar todos los registros?")){
    return;
  }

  records = [];

  saveRecords();

  renderRecords();
});

document.getElementById("exportPDF")
.addEventListener("click",()=>{

  if(records.length === 0){
    alert("No hay datos para exportar");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(16);
  doc.text("Reporte de presión arterial", 14, 20);

  doc.setFontSize(11);
  let y = 30;

  records.forEach((r,index)=>{
    const line = `${index + 1}. ${r.date} ${r.time} - ${r.sys}/${r.dia} mmHg - ${r.pulse} BPM`;
    doc.text(line, 14, y);
    y += 8;
    if(y > 280){
      doc.addPage();
      y = 20;
    }
  });

  doc.save("reporte-presion.pdf");
});

document.getElementById("exportCSV")
.addEventListener("click",()=>{

  if(records.length === 0){
    alert("No hay datos para exportar");
    return;
  }

  const headers = ["Fecha","Hora","Sistólica","Diastólica","Pulso"];
  const rows = records.map(r => [
    r.date,
    r.time,
    r.sys,
    r.dia,
    r.pulse
  ]);

  const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");

  downloadFile(csv, "datos-presion.csv", "text/csv");
});

document.getElementById("exportJSON")
.addEventListener("click",()=>{

  const json = JSON.stringify(records,null,2);

  downloadFile(
    json,
    "respaldo-salud.json",
    "application/json"
  );
});

function downloadFile(content,fileName,type){

  const blob = new Blob(
    [content],
    { type }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;
  a.download = fileName;

  document.body.appendChild(a);

  a.click();

  a.remove();

  URL.revokeObjectURL(url);
}

const importInput =
document.getElementById("importFile");

importInput.addEventListener(
  "change",
  function(event){

    const file = event.target.files[0];

    if(!file){
      return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

      try{

        const importedData =
        JSON.parse(e.target.result);

        if(!Array.isArray(importedData)){
          throw new Error("Formato inválido");
        }

        records.length = 0;

        importedData.forEach(item=>{

          records.push({
            id:item.id || crypto.randomUUID(),
            date:item.date,
            time:item.time,
            sys:Number(item.sys),
            dia:Number(item.dia),
            pulse:Number(item.pulse)
          });

        });

        saveRecords();

        renderRecords();

        alert("Backup importado correctamente");

      }catch(error){

        console.error(error);

        alert("Error al importar JSON");
      }
    };

    reader.readAsText(file);

    event.target.value = "";
});

renderRecords();

</script>

</body>
</html>
